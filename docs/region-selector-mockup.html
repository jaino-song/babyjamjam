<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아가잼잼 - 지역 선택 모달 Mockup</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard Variable', -apple-system, sans-serif;
    background: #f5f7fa;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }

  .trigger-btn {
    position: fixed; top: 24px; right: 24px;
    padding: 12px 28px; background: #004AAD; color: #fff; border: none;
    border-radius: 640px; font-family: inherit; font-weight: 800; font-size: 14px;
    cursor: pointer; z-index: 100; letter-spacing: -0.025em;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff; border-radius: 24px; width: 780px; max-height: 90vh;
    overflow: hidden; box-shadow: 0 32px 80px rgba(0,36,87,0.18);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .modal-overlay.active .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 32px 16px; border-bottom: 1px solid #eee; flex-shrink: 0;
  }
  .modal-header h2 { font-size: 22px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.02em; }
  .modal-close {
    width: 36px; height: 36px; border: none; background: #f5f5f5; border-radius: 50%;
    font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #666; transition: background 0.2s;
  }
  .modal-close:hover { background: #e8e8e8; }

  /* Nav bar wrap */
  .nav-bar-wrap {
    display: flex; flex-direction: column; gap: 12px;
    padding: 16px 32px 16px; flex-shrink: 0;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #999; font-weight: 600;
  }
  .breadcrumb span { cursor: pointer; transition: color 0.2s; }
  .breadcrumb span:hover { color: #004AAD; }
  .breadcrumb .current { color: #004AAD; font-weight: 700; cursor: default; }
  .breadcrumb .sep { color: #ccc; cursor: default; }
  .breadcrumb .sep:hover { color: #ccc; }

  /* Map container */
  .map-container {
    flex: 1; padding: 16px 32px 24px; display: flex; align-items: center; justify-content: center;
    perspective: 1200px; min-height: 500px; position: relative;
  }
  .map-wrapper {
    transform: rotateX(20deg) rotateZ(-3deg);
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    filter: drop-shadow(0 24px 48px rgba(0,74,173,0.15));
  }
  .map-wrapper svg { display: block; }

  /* D3 map region styles */
  .province { stroke: #fff; stroke-width: 1.2; cursor: pointer; transition: fill 0.2s, filter 0.2s; }
  .province.available { fill: #c5d8f0; }
  .province.unavailable { fill: #e8eaed; cursor: default; opacity: 0.7; pointer-events: none; }
  .province.available:hover { fill: #004AAD; filter: brightness(1.15); }

  .municipality { stroke: #fff; stroke-width: 0.8; cursor: pointer; transition: fill 0.2s, filter 0.2s; }
  .municipality.available { fill: #c5d8f0; }
  .municipality.unavailable { fill: #e8eaed; cursor: default; opacity: 0.6; pointer-events: none; }
  .municipality.available:hover { fill: #004AAD; filter: brightness(1.15); }

  .region-label { display: none; }

  /* Tooltip */
  .map-tooltip {
    position: fixed; background: #1a1a1a; color: #fff;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 2000; white-space: nowrap;
  }
  .map-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #1a1a1a;
  }

  /* Back button */
  .back-btn {
    padding: 8px 16px; background: #f0f2f5; border: 1px solid #ddd;
    border-radius: 8px; font-family: inherit; font-size: 13px; font-weight: 600;
    color: #555; cursor: pointer; transition: all 0.2s; display: none;
    align-self: flex-start;
  }
  .back-btn:hover { background: #e4e7ec; color: #333; }
  .back-btn.visible { display: flex; align-items: center; gap: 6px; }

  /* Footer */
  .modal-footer {
    padding: 16px 32px; display: flex; align-items: center; gap: 8px;
    background: #f9fafb; border-top: 1px solid #eee; flex-shrink: 0;
  }
  .modal-footer .info-icon {
    width: 20px; height: 20px; background: #004AAD; color: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; flex-shrink: 0;
  }
  .modal-footer p { font-size: 13px; color: #666; font-weight: 500; }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; color: #999; font-size: 14px; }

  /* ===== Consultation Form ===== */
  .form-panel {
    display: none; padding: 24px 40px 40px; flex-direction: column; gap: 40px;
    overflow-y: auto; max-height: 70vh;
  }
  .form-panel.active { display: flex; }


  .form-intro {
    display: flex; flex-direction: column; gap: 8px;
  }
  .form-intro h3 {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 28px; font-weight: 800; color: #1e3a8a; line-height: 1.3;
  }
  .form-intro p {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 13px; color: #888; line-height: 1.6; font-weight: 500;
  }

  .form-region-badge {
    display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
    background: #eef3fb; color: #004AAD; padding: 8px 16px; border-radius: 32px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
    font-family: 'Pretendard Variable', sans-serif;
  }
  .form-region-badge:hover { background: #dce6f7; }
  .form-region-badge .badge-icon { font-size: 11px; }

  .form-fields {
    display: flex; flex-direction: column; gap: 32px;
  }

  .form-group {
    display: flex; flex-direction: column; gap: 8px;
  }
  .form-label {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 18px; font-weight: 600; color: #374151;
    display: flex; align-items: center; gap: 8px;
  }
  .form-label .required { color: #e74c3c; font-size: 14px; }
  .form-hint {
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 12px; color: #6b7280; font-weight: 500; line-height: 1.5;
  }

  .form-input, .form-select {
    height: 40px; padding: 0 16px;
    border: 1px solid #e5e7eb; border-radius: 32px;
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 15px; font-weight: 500; color: #333;
    transition: border-color 0.2s; outline: none; background: #fff;
    letter-spacing: 0.02em;
  }
  .form-input:focus, .form-select:focus { border-color: #004AAD; }
  .form-input::placeholder { color: #9ca3af; font-weight: 500; }

  .form-select {
    appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  .form-select.placeholder { color: #9ca3af; }

  .form-radio-group {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .form-radio { position: relative; }
  .form-radio input { position: absolute; opacity: 0; width: 0; height: 0; }
  .form-radio label {
    display: inline-flex; height: 40px; padding: 0 20px; align-items: center;
    border: 1px solid #e5e7eb; border-radius: 32px;
    font-family: 'Pretendard Variable', sans-serif;
    font-size: 15px; font-weight: 500; color: #555;
    cursor: pointer; transition: all 0.2s; background: #fff;
  }
  .form-radio label:hover { border-color: #004AAD; color: #004AAD; }
  .form-radio input:checked + label {
    background: #004AAD; border-color: #004AAD; color: #fff;
  }

  .form-submit-row {
    display: flex; justify-content: flex-end;
  }
  .form-submit {
    padding: 14px 32px; background: #1e3a8a; color: #fff; border: none;
    border-radius: 640px; font-family: 'Pretendard Variable', sans-serif;
    font-weight: 800; font-size: 14px; cursor: pointer; transition: background 0.2s;
  }
  .form-submit:hover { background: #172e73; }
</style>
</head>
<body>

<button class="trigger-btn" onclick="openModal()">예약하기</button>

<div class="map-tooltip" id="tooltip"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>지역을 선택해 주세요</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="nav-bar-wrap" id="navBarWrap">
      <div class="breadcrumb" id="breadcrumb">
        <span class="current">대한민국</span>
      </div>
      <button class="back-btn" id="backBtn" onclick="goBack()">← 이전</button>
    </div>

    <div class="map-container" id="mapContainer">
      <div class="map-wrapper" id="mapWrapper">
        <div class="loading" id="loading">지도를 불러오는 중...</div>
      </div>
    </div>

    <!-- Consultation Form -->
    <div class="form-panel" id="formPanel">
      <div class="form-intro">
        <p>산후도우미 서비스에 대해서 궁금한 점이 있으시다면,<br>부담없이 상담 받으세요. 바로 예약하지 않으셔도 괜찮아요!</p>
      </div>

      <div class="form-fields">
        <div class="form-group">
          <div class="form-label">산모님 성함 <span class="required">*</span></div>
          <input class="form-input" type="text" placeholder="성함을 입력해 주세요" data-required oninput="validateForm()">
        </div>

        <div class="form-group">
          <div class="form-label">산모님 연락처 <span class="required">*</span></div>
          <input class="form-input" type="tel" placeholder="010-0000-0000" data-required oninput="validateForm()">
        </div>

        <div class="form-group">
          <div class="form-label">주소 <span class="required">*</span></div>
          <input class="form-input" type="text" placeholder="00구 00동 까지" id="formAddress" data-required oninput="validateForm()">
        </div>

        <div class="form-group">
          <div class="form-label">출산 예정일 <span class="required">*</span></div>
          <input class="form-input" type="date" data-required oninput="validateForm()" onchange="validateForm()">
        </div>

        <div class="form-group">
          <div class="form-label">출산 경험 <span class="required">*</span></div>
          <div class="form-radio-group">
            <div class="form-radio">
              <input type="radio" name="birthExp" id="birthFirst" value="초산" onchange="validateForm()">
              <label for="birthFirst">초산</label>
            </div>
            <div class="form-radio">
              <input type="radio" name="birthExp" id="birthExp" value="경산" onchange="validateForm()">
              <label for="birthExp">경산</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="form-label">정부지원 바우처 유형</div>
          <input class="form-input" type="text" placeholder="A통합-0형 (없으면 무기재)">
        </div>

        <div class="form-group">
          <div class="form-label">원하시는 관리사님 성함</div>
          <input class="form-input" type="text" placeholder="없으면 무기재">
        </div>

        <div class="form-group">
          <div class="form-label">아가잼잼을 어떻게 알게 되셨나요? <span class="required">*</span></div>
          <select class="form-select placeholder" data-required onchange="this.classList.toggle('placeholder', !this.value); validateForm()">
            <option value="">항목을 선택해 주세요</option>
            <option value="시군구청">시·군·구청 또는 보건소</option>
            <option value="지인소개">친척 또는 지인 소개</option>
            <option value="블로그">블로그</option>
            <option value="카페">네이버 카페</option>
            <option value="검색">네이버 검색</option>
            <option value="타기관">타기관 소개</option>
          </select>
        </div>

        <div class="form-submit-row">
          <button class="form-submit" id="submitBtn" onclick="submitForm()" disabled>상담 신청하기</button>
        </div>
      </div>
    </div>

    <div class="modal-footer" id="modalFooter">
      <div class="info-icon">!</div>
      <p>서비스 가능 지역만 선택할 수 있습니다. 추가 지역은 순차적으로 오픈 예정이에요.</p>
    </div>
  </div>
</div>

<script>
// ===== Configuration =====
const PROVINCE_URL = 'https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_provinces_geo_simple.json';
const MUNICIPALITY_URL = 'https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_municipalities_geo_simple.json';

// Available service areas
const AVAILABLE_PROVINCES = new Set(['서울특별시', '인천광역시', '경기도', '경상북도']);

// Province code -> available municipalities
// 수도권: 구 단위까지, 경상북도: 시 단위까지
const AVAILABLE_MUNICIPALITIES = {
  // 서울 - 모든 구 가능
  '11': 'all',
  // 인천 - 모든 구/군 가능
  '23': 'all',
  // 경기도 - 특정 시만 가능 (code prefix matching)
  '31': new Set([
    '31051', '31052', '31053',             // 부천시 (원미구, 소사구, 오정구)
    '31101', '31103', '31104',             // 고양시 (덕양구, 일산동구, 일산서구)
    '31200',                                // 파주시
  ]),
  // 경상북도 - 경산시만
  '37': new Set(['37100']),
};

// Display name overrides
const DISPLAY_NAMES = {
  '고양시일산동구': '일산동구',
  '고양시일산서구': '일산서구',
  '고양시덕양구': '덕양구',
  '부천시원미구': '원미구',
  '부천시소사구': '소사구',
  '부천시오정구': '오정구',
};

// Province code prefix from province name
const PROVINCE_CODE_MAP = {
  '서울특별시': '11',
  '부산광역시': '21',
  '대구광역시': '22',
  '인천광역시': '23',
  '광주광역시': '24',
  '대전광역시': '25',
  '울산광역시': '26',
  '세종특별자치시': '29',
  '경기도': '31',
  '강원도': '32',
  '충청북도': '33',
  '충청남도': '34',
  '전라북도': '35',
  '전라남도': '36',
  '경상북도': '37',
  '경상남도': '38',
  '제주특별자치도': '39',
};

// Short labels for provinces on the map
const SHORT_LABELS = {
  '서울특별시': '서울',
  '부산광역시': '부산',
  '대구광역시': '대구',
  '인천광역시': '인천',
  '광주광역시': '광주',
  '대전광역시': '대전',
  '울산광역시': '울산',
  '세종특별자치시': '세종',
  '경기도': '경기도',
  '강원도': '강원도',
  '충청북도': '충북',
  '충청남도': '충남',
  '전라북도': '전북',
  '전라남도': '전남',
  '경상북도': '경북',
  '경상남도': '경남',
  '제주특별자치도': '제주',
};

// Island provinces to exclude entirely
const EXCLUDED_PROVINCES = new Set(['제주특별자치도']);
// Island municipalities to exclude entirely
const EXCLUDED_MUNICIPALITIES = new Set(['23320', '23310', '37430']); // 옹진군, 강화군, 울릉군
// Municipalities to keep specific polygon parts (indices to keep)
const KEEP_PARTS = { '23010': [1, 2] }; // 인천 중구: 내륙(1) + 영종도(2), 무의도(0) 제외

// Strip island polygons: for each MultiPolygon, keep the polygon closest to
// the mainland center (computed from single-Polygon features in the same group).
function stripIslands(geojson) {
  // Step 1: group features by province code prefix (first 2 digits)
  const groups = {};
  for (const f of geojson.features) {
    const prefix = f.properties.code.slice(0, 2);
    (groups[prefix] ||= []).push(f);
  }

  // Step 2: for each group, compute mainland center from single-Polygon features
  const mainlandCenters = {};
  for (const [prefix, features] of Object.entries(groups)) {
    const singles = features.filter(f => f.geometry.type === 'Polygon');
    if (singles.length === 0) {
      // fallback: use centroid of the largest polygon across all features
      mainlandCenters[prefix] = null;
      continue;
    }
    let sumX = 0, sumY = 0, count = 0;
    for (const f of singles) {
      const ring = f.geometry.coordinates[0];
      for (const [x, y] of ring) { sumX += x; sumY += y; count++; }
    }
    mainlandCenters[prefix] = [sumX / count, sumY / count];
  }

  // Step 3: for MultiPolygon features, keep the polygon closest to mainland center
  return {
    ...geojson,
    features: geojson.features.map(f => {
      const geom = f.geometry;
      if (geom.type !== 'MultiPolygon') return f;
      if (KEEP_PARTS[f.properties.code]) {
        const indices = KEEP_PARTS[f.properties.code];
        const filtered = indices.map(i => geom.coordinates[i]);
        return { ...f, geometry: { type: 'MultiPolygon', coordinates: filtered } };
      }

      const prefix = f.properties.code.slice(0, 2);
      const center = mainlandCenters[prefix];

      let bestIdx = 0;

      if (center) {
        // Pick polygon whose centroid is closest to mainland center
        let bestDist = Infinity;
        geom.coordinates.forEach((poly, i) => {
          const ring = poly[0];
          let cx = 0, cy = 0;
          for (const [x, y] of ring) { cx += x; cy += y; }
          cx /= ring.length; cy /= ring.length;
          const dist = (cx - center[0]) ** 2 + (cy - center[1]) ** 2;
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        });
      } else {
        // Fallback: keep largest polygon
        let maxArea = -1;
        geom.coordinates.forEach((poly, i) => {
          const ring = poly[0];
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          for (const [x, y] of ring) {
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
          }
          const area = (maxX - minX) * (maxY - minY);
          if (area > maxArea) { maxArea = area; maxIdx = i; bestIdx = i; }
        });
      }

      return {
        ...f,
        geometry: { type: 'Polygon', coordinates: geom.coordinates[bestIdx] }
      };
    })
  };
}

// ===== State =====
let provincesGeo = null;
let municipalitiesGeo = null;
let currentView = 'provinces';  // 'provinces' | 'municipalities'
let currentProvince = null;     // selected province name
let navStack = [];              // for breadcrumb history

const MAP_W = 520;
const MAP_H = 580;
const tooltip = document.getElementById('tooltip');

// ===== Data Loading =====
async function loadData() {
  const [prov, muni] = await Promise.all([
    d3.json(PROVINCE_URL),
    d3.json(MUNICIPALITY_URL),
  ]);
  provincesGeo = stripIslands(prov);
  municipalitiesGeo = stripIslands(muni);
  document.getElementById('loading').remove();
  renderProvinces();
}

// ===== Province View =====
function renderProvinces() {
  currentView = 'provinces';
  currentProvince = null;
  document.getElementById('backBtn').classList.remove('visible');
  updateBreadcrumb([{ label: '대한민국' }]);
  showMapContainer();

  const wrapper = document.getElementById('mapWrapper');
  wrapper.innerHTML = '';

  // Filter out island provinces
  const mainlandFeatures = provincesGeo.features.filter(f => !EXCLUDED_PROVINCES.has(f.properties.name));
  const mainlandGeo = { type: 'FeatureCollection', features: mainlandFeatures };

  const svg = d3.select(wrapper).append('svg')
    .attr('width', MAP_W).attr('height', MAP_H)
    .attr('viewBox', `0 0 ${MAP_W} ${MAP_H}`);

  // fitExtent on mainland only for maximum zoom
  const projection = d3.geoMercator()
    .fitExtent([[20, 20], [MAP_W - 20, MAP_H - 20]], mainlandGeo);

  const path = d3.geoPath().projection(projection);

  // Draw provinces
  svg.selectAll('.province')
    .data(mainlandFeatures)
    .enter()
    .append('path')
    .attr('class', d => {
      const avail = AVAILABLE_PROVINCES.has(d.properties.name);
      return `province ${avail ? 'available' : 'unavailable'}`;
    })
    .attr('d', path)
    .on('mouseenter', function(event, d) {
      const avail = AVAILABLE_PROVINCES.has(d.properties.name);
      if (!avail) return;
      const label = SHORT_LABELS[d.properties.name] || d.properties.name;
      showTooltip(event, label);
    })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseleave', function() { hideTooltip(); })
    .on('click', (event, d) => {
      if (AVAILABLE_PROVINCES.has(d.properties.name)) {
        drillToMunicipalities(d.properties.name);
      }
    });

}

// ===== Municipality View =====
function drillToMunicipalities(provinceName) {
  currentView = 'municipalities';
  currentProvince = provinceName;
  document.getElementById('backBtn').classList.add('visible');
  updateBreadcrumb([
    { label: '대한민국', action: () => renderProvinces() },
    { label: SHORT_LABELS[provinceName] || provinceName },
  ]);
  showMapContainer();

  const provCode = PROVINCE_CODE_MAP[provinceName];
  const availSet = AVAILABLE_MUNICIPALITIES[provCode];

  // Filter municipalities for this province, exclude islands
  const features = municipalitiesGeo.features.filter(f =>
    f.properties.code.startsWith(provCode) && !EXCLUDED_MUNICIPALITIES.has(f.properties.code)
  );

  const wrapper = document.getElementById('mapWrapper');
  wrapper.innerHTML = '';

  const svg = d3.select(wrapper).append('svg')
    .attr('width', MAP_W).attr('height', MAP_H)
    .attr('viewBox', `0 0 ${MAP_W} ${MAP_H}`);

  // Compute bounds and fit projection
  const tempGeo = { type: 'FeatureCollection', features };
  const projection = d3.geoMercator().fitExtent([[40, 40], [MAP_W - 40, MAP_H - 40]], tempGeo);
  const path = d3.geoPath().projection(projection);

  // Draw municipalities
  svg.selectAll('.municipality')
    .data(features)
    .enter()
    .append('path')
    .attr('class', d => {
      const avail = isMuniAvailable(d.properties.code, availSet);
      return `municipality ${avail ? 'available' : 'unavailable'}`;
    })
    .attr('d', path)
    .on('mouseenter', function(event, d) {
      const avail = isMuniAvailable(d.properties.code, availSet);
      if (!avail) return;
      const name = DISPLAY_NAMES[d.properties.name] || d.properties.name;
      showTooltip(event, name);
    })
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseleave', function() { hideTooltip(); })
    .on('click', (event, d) => {
      const avail = isMuniAvailable(d.properties.code, availSet);
      if (!avail) return;
      const displayName = DISPLAY_NAMES[d.properties.name] || d.properties.name;
      selectRegion(provinceName, displayName);
    });

}

function isMuniAvailable(code, availSet) {
  if (availSet === 'all') return true;
  if (!availSet) return false;
  return availSet.has(code);
}

// ===== Selection =====
let lastProvince = null;

function selectRegion(province, area) {
  const shortProv = SHORT_LABELS[province] || province;
  lastProvince = province;
  currentView = 'form';

  document.getElementById('mapContainer').style.display = 'none';
  document.getElementById('formPanel').classList.add('active');
  document.getElementById('modalFooter').style.display = 'none';
  document.querySelector('.modal-header h2').textContent = '상담 신청';
  document.getElementById('backBtn').classList.add('visible');

  updateBreadcrumb([
    { label: '대한민국', action: () => renderProvinces() },
    { label: shortProv, action: () => drillToMunicipalities(province) },
    { label: area },
  ]);
}

function validateForm() {
  const inputs = document.querySelectorAll('#formPanel [data-required]');
  const radioChecked = document.querySelector('input[name="birthExp"]:checked');
  let valid = !!radioChecked;
  inputs.forEach(el => {
    if (!el.value.trim()) valid = false;
  });
  document.getElementById('submitBtn').disabled = !valid;
}

function submitForm() {
  alert('상담 신청이 완료되었습니다!\n빠른 시일 내에 연락 드리겠습니다.');
  closeModal();
}

// ===== Navigation =====
function goBack() {
  if (currentView === 'form' && lastProvince) {
    drillToMunicipalities(lastProvince);
  } else if (currentView === 'municipalities') {
    renderProvinces();
  }
}

function showMapContainer() {
  document.getElementById('mapContainer').style.display = 'flex';
  document.getElementById('formPanel').classList.remove('active');
  document.getElementById('modalFooter').style.display = 'flex';
  document.querySelector('.modal-header h2').textContent = '지역을 선택해 주세요';
}

// ===== Breadcrumb =====
function updateBreadcrumb(parts) {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';
  parts.forEach((part, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    }
    const span = document.createElement('span');
    span.textContent = part.label;
    if (i === parts.length - 1) {
      span.className = 'current';
    } else if (part.action) {
      span.onclick = part.action;
    }
    bc.appendChild(span);
  });
}

// ===== Tooltip =====
function showTooltip(event, text) {
  tooltip.textContent = text;
  tooltip.style.opacity = '1';
  moveTooltip(event);
}
function moveTooltip(event) {
  tooltip.style.left = (event.clientX - tooltip.offsetWidth / 2) + 'px';
  tooltip.style.top = (event.clientY - tooltip.offsetHeight - 16) + 'px';
}
function hideTooltip() {
  tooltip.style.opacity = '0';
}

// ===== Modal =====
function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
  renderProvinces();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ===== Init =====
loadData().then(() => setTimeout(openModal, 300));
</script>
</body>
