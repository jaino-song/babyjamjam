<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>October Soft Calendar</title>
  <link rel="stylesheet" href="/mockups/chat-prototype/app-detail/calendar-shared.css">
</head>
<body class="variant-soft">
  <main class="mobile">
    <section class="top">
      <div class="brand">
        <span class="brand-badge">아가잼잼 케어 캘린더</span>
        <span class="brand-pill"></span>
      </div>
      <div class="hero">
        <p class="eyebrow">October care plan</p>
        <h1>10월 서비스 일정을<br>한 화면에 정리했어요.</h1>
        <p>상담, 바우처 서류 마감, 관리사 방문 시작일을 월간 달력 기준으로 확인할 수 있어요.</p>
      </div>
    </section>

    <section class="calendar">
      <div class="calendar-head">
        <h2>2026년 10월</h2>
        <span class="calendar-chip">예정 일정 4건</span>
      </div>
      <div class="weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
      <div class="grid">
        <div class="day empty"></div><div class="day empty"></div><div class="day empty"></div><div class="day empty"></div>
        <div class="day"><strong>1</strong></div>
        <div class="day"><strong>2</strong></div>
        <div class="day"><strong>3</strong></div>
        <div class="day"><strong>4</strong></div>
        <div class="day"><strong>5</strong></div>
        <div class="day"><strong>6</strong></div>
        <div class="day"><strong>7</strong></div>
        <div class="day featured"><strong>8</strong><span class="dot primary"></span><span class="caption">상담</span></div>
        <div class="day"><strong>9</strong></div>
        <div class="day"><strong>10</strong></div>
        <div class="day"><strong>11</strong></div>
        <div class="day"><strong>12</strong></div>
        <div class="day accented"><strong>13</strong><span class="dot accent"></span><span class="caption">서류</span></div>
        <div class="day"><strong>14</strong></div>
        <div class="day"><strong>15</strong></div>
        <div class="day"><strong>16</strong></div>
        <div class="day"><strong>17</strong></div>
        <div class="day"><strong>18</strong></div>
        <div class="day"><strong>19</strong></div>
        <div class="day"><strong>20</strong></div>
        <div class="day good"><strong>21</strong><span class="dot good"></span><span class="caption">시작</span></div>
        <div class="day"><strong>22</strong></div>
        <div class="day"><strong>23</strong></div>
        <div class="day"><strong>24</strong></div>
        <div class="day"><strong>25</strong></div>
        <div class="day"><strong>26</strong></div>
        <div class="day"><strong>27</strong></div>
        <div class="day"><strong>28</strong></div>
        <div class="day"><strong>29</strong></div>
        <div class="day featured"><strong>30</strong><span class="dot primary"></span><span class="caption">점검</span></div>
        <div class="day"><strong>31</strong></div>
      </div>
    </section>

    <section class="stack">
      <div class="panel">
        <h3>이번 달 핵심 일정</h3>
        <p>10월 8일 첫 상담, 10월 13일 바우처 서류 마감, 10월 21일 서비스 시작 예정입니다.</p>
      </div>
    </section>
    <div class="footer-space"></div>
  </main>
</body>
</html>
