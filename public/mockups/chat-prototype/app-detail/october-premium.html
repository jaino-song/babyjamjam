<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>October Premium Calendar</title>
  <link rel="stylesheet" href="/mockups/chat-prototype/app-detail/calendar-shared.css">
</head>
<body class="variant-soft">
  <main class="mobile">
    <section class="top">
      <div class="brand">
        <span class="brand-badge">앱 상세 목업 E</span>
        <span class="brand-pill"></span>
      </div>
      <div class="hero">
        <p class="eyebrow">Editorial premium</p>
        <h1>한 달 전체가 아닌,<br>중요한 날이 더 또렷한 달력</h1>
        <p>상단 카피를 강하게 두고, 달력은 더 단정하고 고급스럽게 정리한 버전입니다.</p>
      </div>
    </section>

    <section class="calendar">
      <div class="calendar-head">
        <h2>October 2026</h2>
        <span class="calendar-chip">Priority days</span>
      </div>
      <div class="weekdays"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
      <div class="grid">
        <div class="day empty"></div><div class="day empty"></div><div class="day empty"></div><div class="day empty"></div>
        <div class="day"><strong>1</strong></div><div class="day"><strong>2</strong></div><div class="day"><strong>3</strong></div>
        <div class="day"><strong>4</strong></div><div class="day"><strong>5</strong></div><div class="day"><strong>6</strong></div><div class="day featured"><strong>7</strong><span class="dot primary"></span></div><div class="day"><strong>8</strong></div><div class="day"><strong>9</strong></div><div class="day"><strong>10</strong></div>
        <div class="day"><strong>11</strong></div><div class="day"><strong>12</strong></div><div class="day accented"><strong>13</strong><span class="dot accent"></span></div><div class="day"><strong>14</strong></div><div class="day"><strong>15</strong></div><div class="day"><strong>16</strong></div><div class="day"><strong>17</strong></div>
        <div class="day"><strong>18</strong></div><div class="day"><strong>19</strong></div><div class="day"><strong>20</strong></div><div class="day good"><strong>21</strong><span class="dot good"></span></div><div class="day"><strong>22</strong></div><div class="day"><strong>23</strong></div><div class="day"><strong>24</strong></div>
        <div class="day"><strong>25</strong></div><div class="day"><strong>26</strong></div><div class="day"><strong>27</strong></div><div class="day"><strong>28</strong></div><div class="day"><strong>29</strong></div><div class="day featured"><strong>30</strong><span class="dot primary"></span></div><div class="day"><strong>31</strong></div>
      </div>
    </section>

    <section class="panel">
      <h3>선택 날짜 요약</h3>
      <p>7일 상담, 13일 서류 마감, 21일 서비스 시작, 30일 서비스 만족도 체크 예정.</p>
    </section>
  </main>
</body>
</html>
